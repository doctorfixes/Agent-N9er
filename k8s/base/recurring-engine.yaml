apiVersion: apps/v1
kind: Deployment
metadata:
  name: recurring-engine
  namespace: agent-n9er
  labels:
    app: recurring-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recurring-engine
  template:
    metadata:
      labels:
        app: recurring-engine
    spec:
      containers:
        - name: recurring-engine
          image: agent-n9er/recurring-engine:latest
          ports:
            - containerPort: 8600
          envFrom:
            - secretRef:
                name: auth-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8600
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8600
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: recurring-engine
  namespace: agent-n9er
spec:
  selector:
    app: recurring-engine
  ports:
    - port: 8600
      targetPort: 8600
