apiVersion: apps/v1
kind: Deployment
metadata:
  name: normalization-service
  namespace: agent-n9er
  labels:
    app: normalization-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: normalization-service
  template:
    metadata:
      labels:
        app: normalization-service
    spec:
      containers:
        - name: normalization-service
          image: agent-n9er/normalization-service:latest
          ports:
            - containerPort: 8100
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: normalization-service
  namespace: agent-n9er
spec:
  selector:
    app: normalization-service
  ports:
    - port: 8100
      targetPort: 8100
