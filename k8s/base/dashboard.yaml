apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: agent-n9er
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: agent-n9er/dashboard:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: service-urls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: agent-n9er
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
