apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agent-n9er
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: agent-n9er/orchestrator:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: service-urls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agent-n9er
spec:
  selector:
    app: orchestrator
  ports:
    - port: 9000
      targetPort: 9000
