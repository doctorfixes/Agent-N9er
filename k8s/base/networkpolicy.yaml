apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-external
  namespace: agent-n9er
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-n9er
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-entrypoints
  namespace: agent-n9er
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - dashboard
          - browser-service
          - orchestrator
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - port: 3000
        - port: 8001
        - port: 9000
