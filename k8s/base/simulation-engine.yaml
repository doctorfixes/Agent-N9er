apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-engine
  namespace: agent-n9er
  labels:
    app: simulation-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulation-engine
  template:
    metadata:
      labels:
        app: simulation-engine
    spec:
      containers:
        - name: simulation-engine
          image: agent-n9er/simulation-engine:latest
          ports:
            - containerPort: 9100
          envFrom:
            - configMapRef:
                name: service-urls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: simulation-engine
  namespace: agent-n9er
spec:
  selector:
    app: simulation-engine
  ports:
    - port: 9100
      targetPort: 9100
