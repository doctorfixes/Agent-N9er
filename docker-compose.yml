version: "3.9"

services:
  orchestrator:
    build: ./orchestrator
    ports:
      - "9000:9000"
    environment:
      - NORMALIZATION_URL=http://normalization-service:8100
      - RANKING_URL=http://ranking-engine:8200
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8400
      - REPUTATION_URL=http://reputation-ledger:8500
      - RECURRING_URL=http://recurring-engine:8600
    depends_on:
      normalization-service:
        condition: service_healthy
      ranking-engine:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      agent-execution:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  normalization-service:
    build: ./normalization_service
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  ranking-engine:
    build: ./ranking_engine
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  bidding-marketplace:
    build: ./bidding_marketplace
    ports:
      - "8300:8300"
    environment:
      - DB_PATH=/data/marketplace.db
    volumes:
      - marketplace-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  agent-execution:
    build: ./agent_execution
    ports:
      - "8400:8400"
    environment:
      - REPUTATION_URL=http://reputation-ledger:8500
      - DB_PATH=/data/execution.db
    volumes:
      - execution-data:/data
    depends_on:
      reputation-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  reputation-ledger:
    build: ./reputation_ledger
    ports:
      - "8500:8500"
    environment:
      - DB_PATH=/data/reputation.db
    volumes:
      - reputation-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  recurring-engine:
    build: ./recurring_engine
    ports:
      - "8600:8600"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  browser-service:
    build: ./browser_service
    ports:
      - "8001:8001"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  simulation-engine:
    build: ./simulation
    ports:
      - "9100:9100"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8400
      - REPUTATION_URL=http://reputation-ledger:8500
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - REPUTATION_URL=http://reputation-ledger:8500
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - SIMULATION_URL=http://simulation-engine:9100
    depends_on:
      orchestrator:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

volumes:
  marketplace-data:
  execution-data:
  reputation-data:
