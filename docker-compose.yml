version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - NORMALIZATION_URL=http://normalization-service:8100
      - RANKING_URL=http://ranking-engine:8200
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8700
      - REPUTATION_URL=http://reputation-ledger:8500
      - RECURRING_URL=http://recurring-engine:8600
      - PROSPECTOR_URL=http://prospector:8900
      - EVALUATOR_URL=http://evaluator:8800
      - BILLING_URL=http://billing:9200
      - REGISTRY_URL=http://agent-registry:9900
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_BUDGET_DEPLOYMENT=${AZURE_OPENAI_BUDGET_DEPLOYMENT:-}
      - AZURE_OPENAI_STANDARD_DEPLOYMENT=${AZURE_OPENAI_STANDARD_DEPLOYMENT:-}
      - AZURE_OPENAI_PREMIUM_DEPLOYMENT=${AZURE_OPENAI_PREMIUM_DEPLOYMENT:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AUTO_SCAN_ENABLED=${AUTO_SCAN_ENABLED:-false}
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-3600}
      - SCAN_PLATFORMS=${SCAN_PLATFORMS:-upwork,github_bounties,freelancer,algora,topcoder}
      - ORCHESTRATOR_DB_PATH=/data/orchestrator.db
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - CORS_ORIGINS=http://localhost:3000,http://dashboard:3000
      - API_KEY=${API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - orchestrator-data:/data
    depends_on:
      redis:
        condition: service_healthy
      normalization-service:
        condition: service_healthy
      ranking-engine:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      agent-execution:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
      evaluator:
        condition: service_healthy
      prospector:
        condition: service_healthy
      billing:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  normalization-service:
    build:
      context: .
      dockerfile: normalization_service/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  ranking-engine:
    build:
      context: .
      dockerfile: ranking_engine/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  bidding-marketplace:
    build:
      context: .
      dockerfile: bidding_marketplace/Dockerfile
    ports:
      - "8300:8300"
    environment:
      - DB_PATH=/data/marketplace.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - marketplace-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  agent-execution:
    build:
      context: .
      dockerfile: agent_execution/Dockerfile
    ports:
      - "8700:8700"
    environment:
      - REPUTATION_URL=http://reputation-ledger:8500
      - DB_PATH=/data/execution.db
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_BUDGET_DEPLOYMENT=${AZURE_OPENAI_BUDGET_DEPLOYMENT:-}
      - AZURE_OPENAI_STANDARD_DEPLOYMENT=${AZURE_OPENAI_STANDARD_DEPLOYMENT:-}
      - AZURE_OPENAI_PREMIUM_DEPLOYMENT=${AZURE_OPENAI_PREMIUM_DEPLOYMENT:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - execution-data:/data
    depends_on:
      reputation-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8700/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  reputation-ledger:
    build:
      context: .
      dockerfile: reputation_ledger/Dockerfile
    ports:
      - "8500:8500"
    environment:
      - DB_PATH=/data/reputation.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - reputation-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  recurring-engine:
    build:
      context: .
      dockerfile: recurring_engine/Dockerfile
    ports:
      - "8600:8600"
    environment:
      - RECURRING_DB_PATH=/data/recurring.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - recurring-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  browser-service:
    build:
      context: .
      dockerfile: browser_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - CORS_ORIGINS=http://localhost:3000,http://dashboard:3000
      - API_KEY=${API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  simulation-engine:
    build:
      context: .
      dockerfile: simulation/Dockerfile
    ports:
      - "9100:9100"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8700
      - REPUTATION_URL=http://reputation-ledger:8500
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  evaluator:
    build:
      context: .
      dockerfile: evaluator_service/Dockerfile
    ports:
      - "8800:8800"
    environment:
      - EVALUATOR_DB_PATH=/data/evaluator.db
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_BUDGET_DEPLOYMENT=${AZURE_OPENAI_BUDGET_DEPLOYMENT:-}
      - AZURE_OPENAI_STANDARD_DEPLOYMENT=${AZURE_OPENAI_STANDARD_DEPLOYMENT:-}
      - AZURE_OPENAI_PREMIUM_DEPLOYMENT=${AZURE_OPENAI_PREMIUM_DEPLOYMENT:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - evaluator-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  prospector:
    build:
      context: .
      dockerfile: prospector_service/Dockerfile
    ports:
      - "8900:8900"
    environment:
      - PROSPECTOR_DB_PATH=/data/prospector.db
      - EVALUATOR_URL=http://evaluator:8800
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - AUTO_EVALUATE=${AUTO_EVALUATE:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
      - NOTIFY_MIN_BUDGET=${NOTIFY_MIN_BUDGET:-100}
    volumes:
      - prospector-data:/data
    depends_on:
      evaluator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  billing:
    build:
      context: .
      dockerfile: billing_service/Dockerfile
    ports:
      - "9200:9200"
    environment:
      - BILLING_DB_PATH=/data/billing.db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - billing-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  enterprise-tools:
    build:
      context: .
      dockerfile: enterprise_tools/Dockerfile
    ports:
      - "9300:9300"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - NORMALIZATION_URL=http://normalization-service:8100
      - RANKING_URL=http://ranking-engine:8200
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8700
      - REPUTATION_URL=http://reputation-ledger:8500
      - RECURRING_URL=http://recurring-engine:8600
      - EVALUATOR_URL=http://evaluator:8800
      - PROSPECTOR_URL=http://prospector:8900
      - BILLING_URL=http://billing:9200
      - ENTERPRISE_DB_PATH=/data/enterprise.db
      - AUDIT_DB_PATH=/data/audit.db
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - API_KEY=${API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - PASSWORD_SALT=${PASSWORD_SALT:-n9er-enterprise-salt}
    volumes:
      - enterprise-data:/data
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9300/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  agent-registry:
    build:
      context: .
      dockerfile: agent_registry/Dockerfile
    ports:
      - "9900:9900"
    environment:
      - REGISTRY_DB_PATH=/data/registry.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - HEARTBEAT_TTL_SECONDS=30
    volumes:
      - registry-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9900/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  agent-launcher-bidder:
    build:
      context: .
      dockerfile: agent_launcher/Dockerfile
    ports:
      - "9901:9901"
    environment:
      - REGISTRY_URL=http://agent-registry:9900
      - BID_SERVICE_URL=http://bid_service:9400
      - HEARTBEAT_INTERVAL=15
      - AGENT_TYPE=bidder
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      agent-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  agent-launcher-prospector:
    build:
      context: .
      dockerfile: agent_launcher/Dockerfile
    ports:
      - "9902:9902"
    environment:
      - REGISTRY_URL=http://agent-registry:9900
      - PROSPECTOR_URL=http://prospector:8900
      - HEARTBEAT_INTERVAL=15
      - AGENT_TYPE=prospector
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      agent-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - REPUTATION_URL=http://reputation-ledger:8500
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - NORMALIZATION_URL=http://normalization-service:8100
      - RANKING_URL=http://ranking-engine:8200
      - EXECUTION_URL=http://agent-execution:8700
      - RECURRING_URL=http://recurring-engine:8600
      - SIMULATION_URL=http://simulation-engine:9100
      - EVALUATOR_URL=http://evaluator:8800
      - PROSPECTOR_URL=http://prospector:8900
      - BILLING_URL=http://billing:9200
      - BROWSER_SERVICE_URL=http://browser-service:8001
      - ENTERPRISE_URL=http://enterprise-tools:9300
      - REGISTRY_URL=http://agent-registry:9900
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      orchestrator:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
      evaluator:
        condition: service_healthy
      prospector:
        condition: service_healthy
      enterprise-tools:
        condition: service_healthy
      agent-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

volumes:
  orchestrator-data:
  marketplace-data:
  execution-data:
  reputation-data:
  recurring-data:
  evaluator-data:
  prospector-data:
  billing-data:
  enterprise-data:
  registry-data:
