version: "3.9"

services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - NORMALIZATION_URL=http://normalization-service:8100
      - RANKING_URL=http://ranking-engine:8200
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8400
      - REPUTATION_URL=http://reputation-ledger:8500
      - RECURRING_URL=http://recurring-engine:8600
      - ORCHESTRATOR_DB_PATH=/data/orchestrator.db
      - VERIXIO_ENV=${VERIXIO_ENV:-development}
      - CORS_ORIGINS=http://localhost:3000,http://dashboard:3000
      - API_KEY=${API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - orchestrator-data:/data
    depends_on:
      normalization-service:
        condition: service_healthy
      ranking-engine:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      agent-execution:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  normalization-service:
    build:
      context: .
      dockerfile: normalization_service/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  ranking-engine:
    build:
      context: .
      dockerfile: ranking_engine/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  bidding-marketplace:
    build:
      context: .
      dockerfile: bidding_marketplace/Dockerfile
    ports:
      - "8300:8300"
    environment:
      - DB_PATH=/data/marketplace.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - marketplace-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  agent-execution:
    build:
      context: .
      dockerfile: agent_execution/Dockerfile
    ports:
      - "8400:8400"
    environment:
      - REPUTATION_URL=http://reputation-ledger:8500
      - DB_PATH=/data/execution.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - execution-data:/data
    depends_on:
      reputation-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  reputation-ledger:
    build:
      context: .
      dockerfile: reputation_ledger/Dockerfile
    ports:
      - "8500:8500"
    environment:
      - DB_PATH=/data/reputation.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - reputation-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  recurring-engine:
    build:
      context: .
      dockerfile: recurring_engine/Dockerfile
    ports:
      - "8600:8600"
    environment:
      - RECURRING_DB_PATH=/data/recurring.db
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    volumes:
      - recurring-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8600/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    restart: unless-stopped

  browser-service:
    build:
      context: .
      dockerfile: browser_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - CORS_ORIGINS=http://localhost:3000,http://dashboard:3000
      - API_KEY=${API_KEY:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

  simulation-engine:
    build:
      context: .
      dockerfile: simulation/Dockerfile
    ports:
      - "9100:9100"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - EXECUTION_URL=http://agent-execution:8400
      - REPUTATION_URL=http://reputation-ledger:8500
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - MARKETPLACE_URL=http://bidding-marketplace:8300
      - REPUTATION_URL=http://reputation-ledger:8500
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - SIMULATION_URL=http://simulation-engine:9100
      - JWT_SECRET=${JWT_SECRET:-verixio-dev-secret-change-in-production}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
    depends_on:
      orchestrator:
        condition: service_healthy
      bidding-marketplace:
        condition: service_healthy
      reputation-ledger:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    restart: unless-stopped

volumes:
  orchestrator-data:
  marketplace-data:
  execution-data:
  reputation-data:
  recurring-data:
